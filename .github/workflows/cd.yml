name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      executed: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
      - name: Check for migration changes
        id: check
        run: |
          if git diff --quiet HEAD~1 -- drizzle/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No migration changes detected. Skipping."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Migration changes detected."
          fi
      - uses: pnpm/action-setup@v4
        if: steps.check.outputs.has_changes == 'true'
      - uses: actions/setup-node@v4
        if: steps.check.outputs.has_changes == 'true'
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
        if: steps.check.outputs.has_changes == 'true'
      - name: Run migrations
        if: steps.check.outputs.has_changes == 'true'
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: pnpm db:migrate

  deploy:
    name: Deploy to Vercel Production
    needs: [migrate]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Install Vercel CLI
        run: pnpm add -g vercel
      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_s7NFsfpUpIu4JHfK6XbEeIjA
          VERCEL_PROJECT_ID: prj_PO3SzQlMaaaHg9PmaiNO43yR40wE
      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_s7NFsfpUpIu4JHfK6XbEeIjA
          VERCEL_PROJECT_ID: prj_PO3SzQlMaaaHg9PmaiNO43yR40wE
      - name: Deploy to Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_s7NFsfpUpIu4JHfK6XbEeIjA
          VERCEL_PROJECT_ID: prj_PO3SzQlMaaaHg9PmaiNO43yR40wE
